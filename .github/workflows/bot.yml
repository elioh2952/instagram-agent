name: Instagram Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # backup only — in case self-trigger chain breaks
  workflow_dispatch:
  repository_dispatch:
    types: [run-bot]

concurrency:
  group: instagram-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install instagrapi groq python-dotenv

      - name: Write session.json
        run: echo "${{ secrets.SESSION_JSON }}" | base64 -d > session.json

      - name: Create .env
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "INSTAGRAM_USERNAME=${{ secrets.INSTAGRAM_USERNAME }}" >> .env
          echo "INSTAGRAM_PASSWORD=${{ secrets.INSTAGRAM_PASSWORD }}" >> .env
          echo "NTFY_TOPIC=${{ secrets.NTFY_TOPIC }}" >> .env

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: agent.db
          key: agent-db-${{ github.run_number }}
          restore-keys: agent-db-

      - name: Run bot
        run: python bot.py

      - name: Save database
        uses: actions/cache@v4
        if: always()
        with:
          path: agent.db
          key: agent-db-${{ github.run_number }}

      - name: Self-trigger next run
        if: always()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.BOT_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"run-bot"}'
          echo "Next run triggered."
